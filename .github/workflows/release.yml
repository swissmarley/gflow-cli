name: Release

# Publish to npm when a version tag is pushed, e.g.:
#   npm version patch        # bumps package.json + creates the tag
#   git push --follow-tags   # triggers this workflow
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (for tests)
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # `npm publish` builds via the prepublishOnly script and uses publishConfig.access=public.
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
